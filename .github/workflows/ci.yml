name: CI

on:
  push:
    branches: [main, "release-candidate/**"]
  pull_request:

permissions:
  contents: read

jobs:
  release-check:
    name: Release check on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run release:check
